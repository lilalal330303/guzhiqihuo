name: Deploy stable strategy archive to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudbase-static-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install CloudBase CLI
        run: npm install --global @cloudbase/cli

      - name: Log in to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      - name: Deploy static site to hosting root
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: tcb hosting deploy . -e "$TCB_ENV_ID"
